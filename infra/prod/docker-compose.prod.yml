# Production override for registry-pulled deploys.
#
# The base docker-compose.yml builds the bridge image on the VM from
# the working copy (good for first-boot bootstrap, slow for repeat
# deploys). This override switches the bridge to a digest-pinned image
# pulled from a registry (GHCR by default), so a CI workflow can build
# once and every VM pulls the same bytes.
#
# Usage on the VM (matches what .github/workflows/deploy.yml does):
#
#   export MIND_BRIDGE_IMAGE='ghcr.io/<owner>/<repo>-bridge@sha256:...'
#   docker compose --env-file .env \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     pull bridge
#   docker compose --env-file .env \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     up -d
#
# If MIND_BRIDGE_IMAGE is unset, compose fails fast — that's deliberate:
# silently falling back to a local build defeats the point of pinning.

services:
  bridge:
    # Replaces the `build:` block from docker-compose.yml.
    image: ${MIND_BRIDGE_IMAGE:?MIND_BRIDGE_IMAGE must be set when using docker-compose.prod.yml}
    build: !reset null
    # `pull_policy: always` was tempting here but it makes every
    # `docker compose up` (including service restarts) re-pull the
    # image, which requires GHCR credentials on the host. Since
    # MIND_BRIDGE_IMAGE is digest-pinned (immutable by definition),
    # an explicit `docker compose pull bridge` in the deploy workflow
    # is the only pull we ever need. Don't add pull_policy back without
    # a long-lived credential story for the VM.
