# Build the bridge image on every `v*` tag push, push it to GHCR, then
# SSH to the deploy VM and roll the compose stack onto the new digest.
#
# Trigger:
#   git tag v0.1.0 && git push --tags
#
# Or manually: Actions → "deploy" → Run workflow → enter a tag/ref.
#
# Required repo secrets:
#   DEPLOY_HOST       — VM hostname or IP
#   DEPLOY_USER       — SSH login (must be in the `docker` group on the VM)
#   DEPLOY_SSH_KEY    — Private key matching an authorized_keys entry on the VM
#   DEPLOY_PORT       — Optional; defaults to 22
#   DEPLOY_DIR        — Optional; defaults to /opt/mind-codespaces
#
# GHCR auth uses the built-in GITHUB_TOKEN — no PAT needed as long as
# the repo's Actions → General → "Workflow permissions" allows
# read+write to packages (default for public repos; flip it on for
# private repos).
#
# The VM must already be bootstrapped (see infra/prod/scripts/bootstrap-vm.sh)
# with a populated infra/prod/.env. This workflow only handles the
# rolling-deploy step — it does NOT manage secrets or first-boot setup.

name: deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build & deploy (tag or branch)"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image_ref.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/prod/Dockerfile.bridge
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Resolve to a digest-pinned reference so the VM pulls exact bytes,
      # not a mutable tag. `${{ steps.push.outputs.digest }}` is the
      # sha256 of the manifest the build just pushed.
      #
      # Lower-case the image name: Docker enforces lowercase repository
      # names, and our org name (MIND-Studio) is mixed case. The
      # metadata-action lowercases for its own outputs but ${{ env.IMAGE_NAME }}
      # is the raw `${{ github.repository }}-bridge` — pass it through tr.
      - name: Emit digest-pinned image ref
        id: image_ref
        run: |
          IMAGE_LC="$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "value=${IMAGE_LC}@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Roll the stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_REF,DEPLOY_DIR,REF
          # The remote shell does not inherit the workflow's env block,
          # so we pipe the values through `envs:` above and reference
          # them as $IMAGE_REF / $DEPLOY_DIR / $REF inside the script.
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_DIR="${DEPLOY_DIR:-/opt/mind-codespaces}"
            cd "$DEPLOY_DIR"
            git fetch --tags --prune
            git checkout --quiet "$REF"
            cd infra/prod
            export MIND_BRIDGE_IMAGE="$IMAGE_REF"
            docker compose --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull bridge
            docker compose --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans
            # Tidy old images so the VM's disk doesn't fill up over
            # many deploys. -f required because we run non-interactively.
            docker image prune -f
            # Print the running bridge digest as a deploy receipt.
            docker compose --env-file .env ps bridge
        env:
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          REF: ${{ inputs.ref || github.ref_name }}
